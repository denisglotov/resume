# Disable line length check (MD013), as sentences in resumes can be long.
MD013: false
# Allow multiple headings with the same content (MD024) if needed.
MD024:
  siblings_only: true
# Allow inline HTML (MD033) for pagebreaks `<!-- pagebreak -->`.
MD033: false
# Disable list indentation check (MD007) since the pagebreak HTML comment interrupts lists and confuses the parser.
MD007: false
